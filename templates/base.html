<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}DarkBlend{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070b12;--bg2:#0d1220;--bg3:#111827;--bg4:#1a2236;
  --cy:#00f5c8;--cyD:#00b894;--cyL:rgba(0,245,200,0.12);
  --lav:#b89aff;--lavD:#7c4dff;
  --rose:#ff6b9d;--roseD:#d63384;
  --peach:#ffb347;--mint:#7fffd4;
  --txt:#e0f0ff;--txm:#6b8caa;--txd:#2a3f55;
  --bd:rgba(0,245,200,0.15);--bd2:rgba(0,245,200,0.3);
  --glow:0 0 24px rgba(0,245,200,0.28),0 0 60px rgba(0,245,200,0.08);
  --r:0.4s cubic-bezier(.34,1.56,.64,1);
}
html,body{min-height:100vh;background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:rgba(0,245,200,0.3);border-radius:2px}
.gbg{background-image:
  linear-gradient(rgba(0,245,200,0.02) 1px,transparent 1px),
  linear-gradient(90deg,rgba(0,245,200,0.02) 1px,transparent 1px);
  background-size:48px 48px}
@keyframes fu{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes glow-pulse{0%,100%{box-shadow:0 0 24px rgba(0,245,200,.1)}50%{box-shadow:0 0 48px rgba(0,245,200,.25)}}
@keyframes modalIn{from{opacity:0;transform:scale(0.93) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes scan-line{0%{top:-4px}100%{top:100%}}
.fade-in{animation:fu 0.45s ease forwards}
.feat-card{transition:all 0.28s cubic-bezier(.34,1.56,.64,1);cursor:pointer}
.feat-card:hover{transform:translateY(-5px) scale(1.03);border-color:rgba(0,245,200,0.45)!important;box-shadow:0 0 28px rgba(0,245,200,0.18)}

/* ─── NAV ─── */
nav.db-nav{
  background:rgba(7,11,18,.97);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--bd);
  padding:0 28px;height:58px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200
}
.nav-logo{
  font-family:'Orbitron',monospace;font-size:18px;font-weight:900;
  color:var(--cy);letter-spacing:0.08em;
  text-shadow:0 0 20px rgba(0,245,200,.4);
  display:flex;align-items:center;gap:8px;
  text-decoration:none;cursor:pointer
}
.nav-logo-icon{
  width:28px;height:28px;border:2px solid var(--cy);border-radius:6px;
  display:flex;align-items:center;justify-content:center;font-size:13px;
  box-shadow:0 0 10px rgba(0,245,200,.3)
}
.nav-links{display:flex;align-items:center;gap:4px}
.nav-link{
  background:transparent;border:none;
  font-family:'Orbitron',monospace;font-size:8px;font-weight:700;
  letter-spacing:0.1em;color:var(--txm);
  cursor:pointer;padding:7px 14px;border-radius:4px;
  transition:0.2s;text-transform:uppercase;
  border-bottom:2px solid transparent;text-decoration:none;
  display:inline-flex;align-items:center
}
.nav-link:hover,.nav-link.active{color:var(--cy);border-bottom-color:var(--cy)}
.nav-user{
  display:flex;align-items:center;gap:8px;
  background:var(--cyL);border:1px solid var(--bd2);
  border-radius:4px;padding:4px 10px;margin-left:8px
}
.nav-avatar{
  width:20px;height:20px;border-radius:3px;
  background:linear-gradient(135deg,var(--lavD),var(--roseD));
  display:flex;align-items:center;justify-content:center;
  font-size:9px;color:#fff;font-weight:700
}
.btn-primary{
  background:var(--cy);color:#070b12;border:none;
  padding:10px 24px;border-radius:6px;
  font-family:'Orbitron',monospace;font-size:9px;font-weight:900;
  cursor:pointer;letter-spacing:0.12em;transition:0.2s;text-transform:uppercase;
  box-shadow:0 0 16px rgba(0,245,200,.3);text-decoration:none;
  display:inline-flex;align-items:center;gap:6px
}
.btn-primary:hover{box-shadow:0 0 28px rgba(0,245,200,.5);transform:translateY(-1px)}
.btn-outline{
  background:transparent;border:1px solid rgba(0,245,200,.3);
  color:var(--txm);padding:10px 20px;border-radius:6px;
  font-family:'Orbitron',monospace;font-size:9px;cursor:pointer;
  letter-spacing:0.12em;transition:0.2s;text-transform:uppercase;text-decoration:none;
  display:inline-flex;align-items:center;gap:6px
}
.btn-outline:hover{border-color:var(--cy);color:var(--cy)}

/* ─── MODAL ─── */
.modal-overlay{
  position:fixed;inset:0;z-index:1000;
  background:rgba(7,11,18,0.85);
  backdrop-filter:blur(10px);
  display:none;align-items:center;justify-content:center;padding:24px
}
.modal-overlay.open{display:flex}
.modal-box{
  background:var(--bg2);border:1px solid rgba(0,245,200,.25);
  border-radius:22px;padding:32px;max-width:600px;width:100%;
  position:relative;animation:modalIn 0.3s ease forwards
}
.modal-topbar{
  position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--cy),var(--lav),transparent);
  border-radius:22px 22px 0 0
}
.modal-close{
  position:absolute;top:14px;right:16px;
  background:none;border:none;color:var(--txm);font-size:18px;cursor:pointer
}
</style>
{% block extra_head %}{% endblock %}
</head>
<body>

<nav class="db-nav">
  <a href="/" class="nav-logo">
    <div class="nav-logo-icon">🛡</div>
    DarkBlend
  </a>
  <div class="nav-links">
    <a href="/" class="nav-link {% if request.endpoint=='home' %}active{% endif %}">Home</a>
    <a href="/features" class="nav-link {% if request.endpoint=='features' %}active{% endif %}">Features</a>
    <a href="/scanner" class="nav-link {% if request.endpoint=='scanner' %}active{% endif %}">Scanner</a>
    {% if user %}
    <a href="/dashboard" class="nav-link {% if request.endpoint=='dashboard' %}active{% endif %}">Account</a>
    <div class="nav-user">
      <div class="nav-avatar">{{ user[0].upper() }}</div>
      <span style="font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--cy)">{{ user.split('@')[0] }}</span>
      <a href="/logout" style="background:none;border:none;color:var(--txd);cursor:pointer;font-size:10px;margin-left:4px;text-decoration:none">✕</a>
    </div>
    {% else %}
    <a href="/signup" class="btn-primary" style="margin-left:8px">Get Started</a>
    {% endif %}
  </div>
</nav>

{% block content %}{% endblock %}

{% block extra_scripts %}{% endblock %}
</body>
</html>
